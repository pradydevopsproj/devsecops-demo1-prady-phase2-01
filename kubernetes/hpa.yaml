apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-tic-tac-toe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tic-tac-toe
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 20
